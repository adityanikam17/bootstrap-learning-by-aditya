<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badges in Css</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

    <p>Headings : </p>
    <h1>Notifications<span class="badge text-bg-primary">New</span></h1>
    <h2>Notifications <span class="badge text-bg-danger">New</span></h2>
    <h3>Notifications <span class="badge text-bg-success">New</span></h3>
    <h4>Notifications <span class="badge text-bg-warning">New</span></h4>
    <h5>Notifications <span class="badge text-bg-info">New</span></h5>
    <h6>Notifications <span class="badge text-bg-secondary">New</span></h6>
    <br>
    <br>
    <p>Buttons : </p>
    <button type="button" class="btn btn-primary">
        Notifications <span class="badge text-bg-secondary">+20</span>
    </button>

    <button type="button" class="btn btn-primary">
        Requests <span class="badge text-bg-danger">+50</span>
    </button>
    <br>
    <br>

    <p>Positioned : </p>
    <button type="button" class="btn btn-primary position-relative">
        Inbox
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
        99+
            <span class="visually-hidden">unread messages</span>
        </span>
    </button>

    <p>Pill Badges : </p>
    <span class="badge rounded-pill text-bg-primary">Primary</span>
    <span class="badge rounded-pill text-bg-secondary">Secondary</span>
    <span class="badge rounded-pill text-bg-success">Success</span>
    <span class="badge rounded-pill text-bg-danger">Danger</span>
    <span class="badge rounded-pill text-bg-warning">Warning</span>
    <span class="badge rounded-pill text-bg-info">Info</span>
    <span class="badge rounded-pill text-bg-light">Light</span>
    <span class="badge rounded-pill text-bg-dark">Dark</span>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
